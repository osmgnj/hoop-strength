<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HOOP STR">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230b1220'/%3E%3Ccircle cx='90' cy='90' r='55' fill='%23ff7a1a'/%3E%3Cpath d='M35 90h110M90 35v110M55 50a75 75 0 0 1 0 80M125 50a75 75 0 0 0 0 80' stroke='%230b1220' stroke-width='5' fill='none'/%3E%3C/svg%3E">
<title>HOOP STRENGTH</title>
<style>
:root{
  --bg:#0b1220;--panel:#131c2e;--panel2:#1a2540;--line:#27344f;
  --txt:#eaf0fb;--sub:#7a8fb5;--accent:#ff7a1a;--green:#34d399;
  --blue:#3b82f6;--purple:#a78bfa;--red:#f87171;--yellow:#fbbf24;
  --r:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;overscroll-behavior:none}

/* ONBOARDING */
#obWrap{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column}
#obWrap.gone{display:none}
.ob-top{padding:20px 20px 0;flex:none}
.ob-progress{display:flex;gap:5px;margin-bottom:24px}
.ob-progress span{flex:1;height:3px;background:var(--line);border-radius:3px;transition:.3s}
.ob-progress span.done{background:var(--accent)}
.ob-progress span.done.seg-data{background:var(--blue)}
.ob-progress span.done.seg-detail{background:var(--purple)}
.ob-progress .seg-div{flex:none;width:2px;background:var(--bg);margin:0 2px}
.ob-step-label{font-size:11px;color:var(--sub);letter-spacing:1.5px;font-weight:700}
.ob-body{flex:1;overflow-y:auto;padding:12px 20px 0}
.ob-q{font-size:22px;font-weight:800;line-height:1.3;margin-bottom:5px}
.ob-sub{font-size:13px;color:var(--sub);margin-bottom:24px}
.ob-cards{display:flex;flex-direction:column;gap:10px}
.ob-card{background:var(--panel);border:2px solid var(--line);border-radius:var(--r);padding:15px 16px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:14px}
.ob-card:active{transform:scale(.98)}
.ob-card.sel{border-color:var(--accent);background:rgba(255,122,26,.08)}
.ob-icon{font-size:24px;flex:none;width:36px;text-align:center}
.ob-label{font-size:15px;font-weight:700}
.ob-desc{font-size:12px;color:var(--sub);margin-top:2px}
.ob-foot{padding:14px 20px calc(14px + env(safe-area-inset-bottom));flex:none}
.ob-next{width:100%;padding:15px;background:var(--accent);color:#0b1220;border:0;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;opacity:.35;pointer-events:none;transition:.2s}
.ob-next.on{opacity:1;pointer-events:auto}
.ob-back{display:block;text-align:center;margin-top:10px;color:var(--sub);font-size:13px;cursor:pointer;background:none;border:0;width:100%;padding:6px}
.ob-note{font-size:12px;color:var(--sub);margin-top:12px;padding:10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:10px}

/* REVEAL */
.ob-reveal{padding:20px}
.reveal-badge{display:inline-flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:18px}
.reveal-h{font-size:22px;font-weight:800;line-height:1.3;margin-bottom:4px}
.reveal-meta{font-size:12px;color:var(--sub);margin-bottom:20px}
.current-target{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:20px}
.ct-label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:1.5px;margin-bottom:10px}
.ct-row{display:flex;align-items:center;gap:10px}
.ct-box{flex:1;text-align:center;background:var(--panel2);border-radius:10px;padding:10px}
.ct-box .ct-val{font-size:14px;font-weight:800}
.ct-box .ct-t{font-size:10px;color:var(--sub);margin-top:2px}
.ct-arrow{font-size:18px;color:var(--sub);flex:none}
.challenge-note{background:rgba(255,122,26,.08);border:1px solid rgba(255,122,26,.2);border-radius:12px;padding:12px 14px;margin-bottom:20px;font-size:13px}
.challenge-note b{color:var(--accent)}
.reveal-path{margin-bottom:20px}
.rp-title{font-size:11px;color:var(--sub);letter-spacing:1.5px;font-weight:700;margin-bottom:10px}
.reveal-stage{border-left:2px solid var(--line);padding-left:16px;margin-left:8px;position:relative;margin-bottom:8px}
.reveal-stage::before{content:"";position:absolute;left:-7px;top:14px;width:12px;height:12px;border-radius:50%;background:var(--line)}
.reveal-stage.current::before{background:var(--accent);box-shadow:0 0 0 3px rgba(255,122,26,.25)}
.reveal-stage.locked{opacity:.4}
.rs-label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:1px;margin-bottom:2px}
.rs-title{font-size:14px;font-weight:700}
.rs-focus{font-size:12px;color:var(--accent);margin-top:2px}
.rs-lock{font-size:11px;color:var(--sub);margin-top:2px}
.tease-sep{font-size:11px;color:var(--sub);letter-spacing:2px;font-weight:700;margin:16px 0 10px}
.tease-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:7px;opacity:.5}
.ti-icon{font-size:18px}
.ti-name{font-size:13px;font-weight:700}
.ti-lock{font-size:11px;color:var(--sub)}
.lock-badge{margin-left:auto;background:var(--panel2);border:1px solid var(--line);padding:3px 8px;border-radius:6px;font-size:10px;color:var(--sub);white-space:nowrap;flex:none}

/* INJURY WARNING */
.injury-banner{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
.injury-banner .ib-icon{font-size:18px;flex:none;margin-top:1px}
.injury-banner b{color:var(--yellow)}

/* APP */
#appWrap{display:none;flex-direction:column;height:100%}
#appWrap.on{display:flex}
header{padding:14px 16px 10px;flex:none}
.hrow{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ball{width:26px;height:26px;border-radius:50%;flex:none;background:radial-gradient(circle at 35% 30%,#ffb06a,var(--accent));position:relative;box-shadow:0 3px 8px rgba(255,122,26,.3)}
.ball::before,.ball::after{content:"";position:absolute;background:rgba(0,0,0,.22)}
.ball::before{left:49%;top:0;width:1.5px;height:100%}
.ball::after{top:49%;left:0;height:1.5px;width:100%}
.brand{font-size:15px;font-weight:800}
.brand small{display:block;font-size:9px;color:var(--sub);letter-spacing:2px;font-weight:600}
.stats{display:flex;gap:7px}
.sitem{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px;text-align:center}
.sitem b{display:block;font-size:18px;line-height:1}
.sitem span{font-size:9px;color:var(--sub);letter-spacing:.5px}
main{flex:1;overflow-y:auto;padding:0 14px 14px}
.view{display:none}
.view.on{display:block;animation:fadeup .2s}
@keyframes fadeup{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.sec{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin:18px 0 9px}

/* GAME DAY TOGGLE */
.gd-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:12px;cursor:pointer}
.gd-title{font-size:14px;font-weight:700}
.gd-sub{font-size:11px;color:var(--sub);margin-top:2px}
.switch{width:44px;height:24px;background:var(--line);border-radius:999px;position:relative;transition:.2s;flex:none}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s}
.switch.on{background:var(--accent)}
.switch.on::after{transform:translateX(20px)}

/* SESSION */
.session-header{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:10px}
.sh-stage{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-bottom:3px}
.sh-title{font-size:17px;font-weight:800}
.sh-focus{font-size:12px;color:var(--sub);margin-top:4px}
.sh-msg{font-size:12px;color:var(--green);margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.sh-progress{margin-top:12px}
.bar-wrap{height:5px;background:var(--line);border-radius:5px;margin-top:5px}
.bar-fill{height:5px;background:var(--accent);border-radius:5px;transition:width .4s}
.bar-label{font-size:11px;color:var(--sub);display:flex;justify-content:space-between}

.ex-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:9px;overflow:hidden}
.ex-card.key-ex{border-color:rgba(255,122,26,.4)}
.ex-card.alt-ex{border-color:rgba(251,191,36,.3)}
.ex-top{display:flex;align-items:center;gap:11px;padding:13px}
.ex-icon{width:44px;height:44px;border-radius:11px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:700}
.ex-dose{font-size:12px;color:var(--accent);font-weight:700;margin-top:2px}
.ex-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;display:inline-block;margin-top:4px}
.badge-key{background:rgba(255,122,26,.12);color:var(--accent)}
.badge-alt{background:rgba(251,191,36,.12);color:var(--yellow)}
.ex-check{width:30px;height:30px;flex:none;border-radius:50%;border:2px solid var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:.15s}
.ex-check.done{background:var(--green);border-color:var(--green);color:#0b1220}
.ex-expand{width:26px;height:26px;flex:none;background:none;border:0;color:var(--sub);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.ex-expand.open{transform:rotate(180deg)}
.ex-detail{border-top:1px solid var(--line);max-height:0;overflow:hidden;transition:.25s}
.ex-detail.open{max-height:400px}
.ex-detail-inner{padding:13px}
.ex-form-title{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:7px}
.ex-form-steps{list-style:none}
.ex-form-steps li{padding:5px 0 5px 18px;position:relative;font-size:12px;border-bottom:1px solid var(--line)}
.ex-form-steps li:last-child{border:0}
.ex-form-steps li::before{content:"▸";position:absolute;left:0;color:var(--accent)}

.milestone-card{border-top:1px solid var(--line);padding:13px;background:rgba(255,122,26,.04)}
.mc-label{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:5px}
.mc-text{font-size:13px;font-weight:700;margin-bottom:10px}
.mc-btn{width:100%;padding:11px;background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
.mc-btn.achieved{background:var(--accent);color:#0b1220}

.recovery-header{background:linear-gradient(135deg,rgba(52,211,153,.08),rgba(59,130,246,.08));border:1px solid rgba(52,211,153,.2);border-radius:var(--r);padding:18px;margin-bottom:12px;text-align:center}
.rh-icon{font-size:32px;margin-bottom:7px}
.rh-title{font-size:17px;font-weight:800}
.rh-sub{font-size:12px;color:var(--sub);margin-top:4px}

/* PATH */
.mountain-header{text-align:center;padding:18px 14px 6px}
.mh-goal{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:2px;margin-bottom:5px}
.mh-title{font-size:20px;font-weight:800;margin-bottom:3px}
.mh-sub{font-size:12px;color:var(--sub)}
.path-wrap{position:relative;padding-left:30px;padding-top:8px}
.path-line{position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--line)}
.path-node{position:relative;margin-bottom:9px}
.path-dot{position:absolute;left:-25px;top:15px;width:14px;height:14px;border-radius:50%;background:var(--line);border:2px solid var(--bg);z-index:1}
.path-node.done .path-dot{background:var(--green)}
.path-node.current .path-dot{background:var(--accent);box-shadow:0 0 0 4px rgba(255,122,26,.2)}
.path-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px}
.path-node.current .path-card{border-color:rgba(255,122,26,.4)}
.path-node.locked .path-card{opacity:.5}
.pc-num{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--sub);margin-bottom:3px}
.pc-title{font-size:15px;font-weight:800;margin-bottom:4px}
.pc-focus{font-size:12px;color:var(--accent);margin-bottom:6px}
.pc-milestone{font-size:12px;color:var(--sub);padding:8px 10px;background:var(--panel2);border-radius:8px}
.pc-lock{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:5px}
.pc-done-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(52,211,153,.12);color:var(--green);font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-top:5px}
.peak-node{background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--purple);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:18px;margin-left:0}
.pk-icon{font-size:28px;margin-bottom:6px}
.pk-title{font-size:14px;font-weight:800;color:var(--purple)}
.pk-sub{font-size:11px;color:var(--sub);margin-top:3px}
.future-section{margin-top:6px;padding-top:14px;border-top:1px dashed var(--line)}
.future-title{font-size:10px;color:var(--sub);letter-spacing:2px;font-weight:700;margin-bottom:9px}
.future-card{display:flex;align-items:center;gap:11px;padding:13px;background:var(--panel);border:1px solid var(--line);border-radius:13px;margin-bottom:7px;opacity:.45}
.fc-icon{font-size:22px}
.fc-name{font-size:13px;font-weight:700}
.fc-lock{font-size:11px;color:var(--sub);margin-top:2px}
.fc-badge{margin-left:auto;background:var(--panel2);border:1px solid var(--line);padding:4px 8px;border-radius:6px;font-size:10px;color:var(--sub);white-space:nowrap;flex:none}

/* SPHERE MAP */
.sphere-map-wrap{text-align:center;margin-bottom:6px}
.sm-label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.sm-sub{font-size:11px;color:var(--sub);margin-top:6px;margin-bottom:2px}
.stage-progress-wrap{margin-bottom:14px}
.stage-spheres{display:flex;align-items:flex-start;padding:0}
.ss-node{display:flex;flex-direction:column;align-items:center;flex:1}
.ss-line{flex:1;height:2px;background:var(--line);margin-top:23px}
.ss-line.done{background:var(--green)}
.ss-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid var(--line);background:var(--panel2);color:var(--sub)}
.ss-circle.done{background:var(--green);border-color:var(--green);color:#0b1220}
.ss-circle.current{background:var(--accent);border-color:var(--accent);color:#0b1220;box-shadow:0 0 0 5px rgba(255,122,26,.2)}
.ss-circle.locked{opacity:.5}
.ss-title{font-size:9px;color:var(--sub);margin-top:6px;text-align:center;padding:0 4px;line-height:1.3}

/* PROFILE */
.profile-section{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:13px;overflow:hidden}
.ps-header{padding:12px 15px;border-bottom:1px solid var(--line);font-size:10px;font-weight:700;color:var(--sub);letter-spacing:2px}
.ps-row{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid var(--line);font-size:13px}
.ps-row:last-child{border:0}
.ps-key{color:var(--sub);font-size:12px}
.ps-val{font-weight:700}
.danger-btn{width:100%;padding:13px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:13px;font-size:13px;font-weight:700;cursor:pointer}

nav.bar{flex:none;display:flex;background:rgba(11,18,32,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
nav.bar button{flex:1;background:none;border:0;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0;font-size:9px;font-weight:700;letter-spacing:.5px;cursor:pointer}
nav.bar button .ic{font-size:20px}
nav.bar button.on{color:var(--accent)}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--green);color:#0b1220;padding:10px 20px;border-radius:999px;font-weight:700;font-size:13px;opacity:0;pointer-events:none;transition:.3s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}
/* MULTI-SELECT CHECK */
.ob-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-left:auto;transition:all .15s}
.ob-check.on{background:var(--accent);border-color:var(--accent)}
.ob-check.on::after{content:'✓';font-size:12px;color:#0b1220;font-weight:900}
/* JUMP SKILL TREE */
.skill-tree{padding:2px 0 10px}
.jt-tag{font-size:9px;color:var(--sub);letter-spacing:1.5px;font-weight:600;text-align:center;text-transform:uppercase;margin-bottom:7px}
.jt-trunk{display:flex;flex-direction:column;align-items:stretch}
.jt-tnode{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
.jt-tnode.done{border-color:var(--accent)}
.jt-tnode.current{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,122,26,.1)}
.jt-tnode.locked{opacity:.45}
.jt-tcirc{width:30px;height:30px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;color:var(--sub)}
.jt-tnode.done .jt-tcirc{background:var(--accent);color:#0b1220}
.jt-tnode.current .jt-tcirc{background:transparent;border:2px solid var(--accent);color:var(--accent)}
.jt-tnode-text{flex:1;min-width:0}
.jt-tnode-label{font-size:13px;font-weight:700}
.jt-tnode-sub{font-size:10px;color:var(--sub);margin-top:1px}
.jt-tbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;white-space:nowrap;background:rgba(255,122,26,.12);color:var(--accent)}
.jt-tbadge.clr{background:rgba(52,211,153,.12);color:var(--green)}
.jt-tvline{width:2px;height:12px;margin:0 auto}
.jt-branches{display:grid;grid-template-columns:1fr 1fr 1fr}
.jt-branch{display:flex;flex-direction:column;align-items:center;padding:0 3px}
.jt-bhead{font-size:9.5px;font-weight:700;letter-spacing:.3px;margin:5px 0 5px;text-align:center;white-space:nowrap}
.jt-bnode{display:flex;align-items:flex-start;gap:5px;padding:6px 7px;background:var(--panel);border:1px solid var(--line);border-radius:8px;width:100%;box-sizing:border-box}
.jt-bnode.locked{opacity:.3}
.jt-bcirc{width:20px;height:20px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;color:var(--sub)}
.jt-bvline{width:2px;height:8px;margin:0 auto}
.jt-bnode-label{font-size:10px;font-weight:700;line-height:1.3}
.jt-bnode-sub{font-size:8.5px;color:var(--sub);margin-top:1px;line-height:1.3}
.jt-dunk-calc{border:1px solid;border-radius:7px;padding:6px 8px;margin-bottom:6px;width:100%;box-sizing:border-box}
/* BRANCH NODE MODAL */
.bn-overlay{position:fixed;inset:0;z-index:300;background:rgba(4,8,18,.75);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.bn-panel{background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:bnUp .25s ease}
@keyframes bnUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.bn-head{font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.bn-title{font-size:19px;font-weight:800;margin-bottom:6px}
.bn-goal{font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.5}
.bn-drill{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.bn-drill-info{flex:1;min-width:0}
.bn-drill-name{font-size:13px;font-weight:700}
.bn-drill-dose{font-size:11px;color:var(--sub);margin-top:1px}
.bn-yt{flex:none;font-size:11px;font-weight:700;color:#fff;background:#e11d48;padding:6px 10px;border-radius:8px;text-decoration:none;white-space:nowrap}
.bn-complete{width:100%;padding:14px;border:none;border-radius:13px;background:var(--accent);color:#0b1220;font-size:14px;font-weight:800;margin-top:10px;cursor:pointer}
.bn-complete.done{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.4)}
.bn-close{width:100%;padding:11px;border:none;border-radius:13px;background:transparent;color:var(--sub);font-size:13px;font-weight:600;margin-top:6px;cursor:pointer}
/* EXERCISE YT LINK */
.ex-yt{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#fff;background:#e11d48;padding:6px 11px;border-radius:8px;text-decoration:none;margin-top:9px}
/* INSTALL */
.install-btn{width:100%;padding:14px;border:none;border-radius:13px;background:var(--accent);color:#0b1220;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:10px}
.install-guide .ig-row{font-size:12px;color:var(--sub);padding:9px 0;border-bottom:1px solid var(--line);line-height:1.6}
.install-guide .ig-row:last-child{border:0}
.install-guide b{color:var(--txt)}
</style>
</head>

<div id="obWrap">
  <div class="ob-top">
    <div class="ob-progress" id="obProg"></div>
    <div class="ob-step-label" id="obStepLabel"></div>
  </div>
  <div class="ob-body" id="obBody"></div>
  <div class="ob-foot" id="obFoot"></div>
</div>

<div id="appWrap">
  <header>
    <div class="hrow">
      <div class="ball"></div>
      <div class="brand"><small>HOOP STRENGTH</small>バスケ筋トレ</div>
    </div>
    <div class="stats">
      <div class="sitem"><b id="stStreak" style="color:var(--accent)">0</b><span>🔥 連続日</span></div>

      <div class="sitem"><b id="stWeek">0</b><span>今週実施</span></div>
    </div>
  </header>
  <main>
    <section class="view on" id="view-today">
      <div class="gd-toggle" id="gdToggle">
        <div><div class="gd-title">今日バスケの練習・試合があった</div><div class="gd-sub" id="gdSub">オフ → トレーニングモード</div></div>
        <div class="switch" id="gdSwitch"></div>
      </div>
      <div id="sessionWrap"></div>
    </section>
    <section class="view" id="view-path">
      <div class="mountain-header">
        <div class="mh-goal" id="pathGoalLabel"></div>
        <div class="mh-title" id="pathTitle"></div>
        <div class="mh-sub" id="pathSub"></div>
      </div>
      <div style="padding:0 14px"><div class="path-wrap" id="pathWrap"></div></div>
    </section>
    <section class="view" id="view-profile">
      <p class="sec">あなたのプロフィール</p>
      <div class="profile-section" id="profileDetail"></div>
      <p class="sec" style="margin-top:20px">📲 アプリとして使う</p>
      <div class="profile-section" id="installSection">
        <button class="install-btn" id="installBtn" style="display:none">📲 ホーム画面にインストール</button>
        <div class="install-guide" id="installGuide">

          <div class="ig-row"><b>Android (Chrome)</b><br>メニュー <span style="opacity:.7">⋮</span> → 「アプリをインストール」または「ホーム画面に追加」</div>
          <div class="ig-row"><b>PC (Chrome / Edge)</b><br>アドレスバー右端のインストールアイコン <span style="opacity:.7">⊕</span> をクリック</div>
        </div>
      </div>
      <p class="sec" style="margin-top:20px">データ管理</p>
      <button class="danger-btn" id="resetBtn">すべてリセット（やり直す）</button>
    </section>
  </main>
  <nav class="bar" id="tabbar">
    <button data-v="today" class="on"><span class="ic">🏀</span>今日</button>
    <button data-v="path"><span class="ic">🗻</span>ルート</button>
    <button data-v="profile"><span class="ic">⚙️</span>設定</button>
  </nav>
</div>

function getStepAt(i){
  if(i===7) return buildAbilityStep(obAnswers.goal);
  if(i===8) return buildFitnessStep(obAnswers.goal);
  if(i===9) return buildChallengeStep(obAnswers.goal);
  return OB_STEPS_BASE[i];
}

let obStep=0, obAnswers={}, obAutoTimer=null;

function renderOB(){
  const step = getStepAt(obStep);
  if(!step){ obStep++; renderOB(); return; }

  let prog='';
  for(let i=0;i<OB_TOTAL;i++){
    if(i===1||i===7) prog+=`<span class="seg-div"></span>`;
    const done=i<=obStep?'done':'';
    const seg=i===0?'':i<=6?'seg-data':'seg-detail';
    prog+=`<span class="${[done,seg].filter(Boolean).join(' ')}"></span>`;
  }
  $('#obProg').innerHTML=prog;
  $('#obStepLabel').textContent=step.stepLabel?`${step.stepLabel} (${obStep+1}/${OB_TOTAL})`:'';


  const isMulti = !!step.multiSelect;
  const selArr = isMulti ? (Array.isArray(obAnswers[step.id])?obAnswers[step.id]:[]) : [];
  const cards = step.opts.map(o=>{
    const isSel = isMulti ? selArr.includes(o.val) : obAnswers[step.id]===o.val;
    const check = isMulti ? `<div class="ob-check${isSel?' on':''}"></div>` : '';
    return `<div class="ob-card ${isSel?'sel':''}" data-step="${step.id}" data-val="${o.val}">
      <div class="ob-icon">${o.icon}</div>
      <div style="flex:1"><div class="ob-label">${o.label}</div><div class="ob-desc">${o.desc}</div></div>
      ${check}
    </div>`;
  }).join('');
  $('#obBody').innerHTML=`<div class="ob-q">${step.q}</div><div class="ob-sub">${step.sub}</div><div class="ob-cards">${cards}</div>${step.note?`<div class="ob-note">📌 ${step.note}</div>`:''}`;

  const hasSel = isMulti
    ? (Array.isArray(obAnswers[step.id]) && obAnswers[step.id].length>0)
    : obAnswers[step.id]!==undefined;
  const isLast = obStep===OB_TOTAL-1;

  // Multi-select: show Next button. Single-select: back button only
  $('#obFoot').innerHTML=`
    ${isMulti ? `<button class="ob-next${hasSel?' on':''}" id="obNext">${isLast?'プランを見る →':'次へ →'}</button>` : ''}
    ${obStep>0?'<button class="ob-back" id="obBack">← 戻る</button>':''}`;

  if(isMulti){ const nx=$('#obNext'); if(nx) nx.onclick=()=>{ if(!hasSel)return; isLast?showReveal():(obStep++,renderOB()); }; }
  const bk=$('#obBack'); if(bk) bk.onclick=()=>{ if(obAutoTimer){clearTimeout(obAutoTimer);obAutoTimer=null;} obStep--; renderOB(); };

  $('#obBody').querySelectorAll('.ob-card').forEach(card=>{
    card.onclick=()=>{
      if(obAutoTimer){clearTimeout(obAutoTimer);obAutoTimer=null;}
      let v=card.dataset.val;
      if(v!==''&&!isNaN(+v)) v=+v;
      if(isMulti){
        let arr=Array.isArray(obAnswers[card.dataset.step])?[...obAnswers[card.dataset.step]]:[];
        if(v==='none'){ arr=arr.includes('none')?[]:['none']; }
        else{ arr=arr.filter(x=>x!=='none'); arr=arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]; }
        obAnswers[card.dataset.step]=arr.length?arr:undefined;
      } else {
        obAnswers[card.dataset.step]=v;
      }
      renderOB();
      if(!isMulti){
        obAutoTimer=setTimeout(()=>{ obAutoTimer=null; isLast?showReveal():(obStep++,renderOB()); },350);
      }
    };
  });
}

function startApp(){
  $('#obWrap').classList.add('gone');
  $('#appWrap').classList.add('on');
  renderStats(); renderToday(); renderPath(); renderProfile();
}

function getGoal(){ return GOALS[DB.profile.goal]; }
function getStage(){ return getGoal().stages[DB.currentStage]; }

function sessionExercises(){
  const stage=getStage();
  const eq=DB.profile.equipment;
  const injArr=Array.isArray(DB.profile.injury)?DB.profile.injury:[DB.profile.injury||'none'];
  const hasInj=injArr.some(x=>x&&x!=='none');
  let exList=stage.sessions[eq]||stage.sessions.gym||stage.sessions.body;

  if(hasInj){
    exList=exList.map(ex=>{
      if(injArr.includes('knee')&&ex.altKnee)     return {...ex.altKnee,_alt:true};
      if(injArr.includes('back')&&ex.altBack)     return {...ex.altBack,_alt:true};
      if(injArr.includes('ankle')&&ex.altAnkle)   return {...ex.altAnkle,_alt:true};
      if(injArr.includes('shoulder')&&ex.altShoulder) return {...ex.altShoulder,_alt:true};
      return ex;
    });
  }
  const count=DB.profile.time<=15?2:DB.profile.time<=30?3:exList.length;
  return exList.slice(0,count);
}

let gameDayMode=false;

function renderToday(){
  gameDayMode=(DB.lastGameDay===today()&&DB.gameDay);
  $('#gdSwitch').classList.toggle('on',gameDayMode);
  $('#gdSub').textContent=gameDayMode?'今日は回復モード — 軽く動かすだけ':'オフ → トレーニングモード';
  gameDayMode ? renderRecovery() : renderSession();
}

function renderSession(){
  const stage=getStage();
  const goal=getGoal();
  const exList=sessionExercises();
  const checked=DB.checkedToday[today()]||[];
  const done=exList.filter(e=>checked.includes(e.id)).length;
  const pct=exList.length?Math.round(done/exList.length*100):0;
  const injArrS=Array.isArray(DB.profile.injury)?DB.profile.injury:[DB.profile.injury||'none'];
  const hasInjS=injArrS.some(x=>x&&x!=='none');

  const challenge=chalArrH[0]||'';
  const injLabelMap={knee:'膝',back:'腰',ankle:'足首',shoulder:'肩'};

  const exHTML=exList.map(ex=>{

      </div>
      <div class="ex-detail" id="detail-${ex.id}">
        <div class="ex-detail-inner">
          <div class="ex-form-title">FORM</div>
          <ul class="ex-form-steps">${form}</ul>
          <a class="ex-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name+' やり方')}" target="_blank" rel="noopener">▶ YouTubeでフォームを見る</a>
        </div>
      </div>
    </div>`;
  }).join('');

  const isCleared=DB.stagesDone.includes(DB.currentStage);
  const milestoneHTML=`<div class="ex-card">
    <div class="milestone-card">
      <div class="mc-label">🎯 このステージのマイルストーン</div>
      <div class="mc-text">${stage.milestone}</div>
      <button class="mc-btn${isCleared?' achieved':''}" id="milestoneBtn">
        ${isCleared?'✓ 達成済み — 次のステージへ進む':'達成した！ 次のステージへ進む'}
      </button>
    </div>
  </div>`;

  $('#sessionWrap').innerHTML=`
    ${injuryBanner}
    <div class="session-header">
      <div class="sh-stage">STAGE ${stage.num} / ${goal.name}ルート</div>
      <div class="sh-title">${stage.title}</div>
      <div class="sh-focus">${stage.focus}</div>
      ${challenge?`<div class="sh-msg">${CHALLENGE_MSG[challenge]||''}</div>`:''}
      ${DB.profile.goal==='strength'&&CONTACT_MSG[DB.profile.fitness]?`<div class="sh-msg">${CONTACT_MSG[DB.profile.fitness]}</div>`:''}
      <div class="sh-progress">

      </div>

    if(!confirm(`「${stage.milestone}」\n\n本当に達成しましたか？`))return;
    DB.stagesDone.push(DB.currentStage);
    const next=DB.currentStage+1;
    if(next<getGoal().stages.length){ DB.currentStage=next; toast(`🎉 Stage ${next+1} 解放！`); }
    else toast('🏆 全ステージ制覇！');
    saveDB(); renderToday(); renderPath(); renderStats();
  };

function renderJumpTree(){
  const done = DB.completedNodes || [];
  const stagesDone = DB.stagesDone || [];
  const gc = GOALS.jump.color || '#f97316';
  const allTrunkDone = stagesDone.includes(2) || DB.currentStage >= 3;
  const lineCol = allTrunkDone ? gc : 'var(--line)';

  // Trunk nodes
  const trunkHTML = JUMP_TREE.trunk.map((n,i)=>{
    const isDone = stagesDone.includes(n.stageIdx);
    const isCurrent = DB.currentStage === n.stageIdx && !isDone;
    const cls = isDone?'done':isCurrent?'current':'locked';
    const badge = isDone
      ? `<div class="jt-tbadge clr">✓ CLEAR</div>`
      : isCurrent ? `<div class="jt-tbadge">進行中</div>` : '';
    const vline = i < JUMP_TREE.trunk.length-1
      ? `<div class="jt-tvline" style="background:${isDone?gc:'var(--line)'}"></div>` : '';
    return `<div class="jt-tnode ${cls}">
      <div class="jt-tcirc">${isDone?'✓':i+1}</div>
      <div class="jt-tnode-text">
        <div class="jt-tnode-label">${n.label}</div>
        <div class="jt-tnode-sub">${n.sub}</div>
      </div>${badge}
    </div>${vline}`;
  }).join('');

  // Active branches: filter by selected challenges
  const selectedChal = Array.isArray(DB.profile.challenge)?DB.profile.challenge:
                       (DB.profile.challenge?[DB.profile.challenge]:[]);
  const activeBranches = JUMP_TREE.branches.filter(b=>selectedChal.includes(b.key));
  const branchesToShow = activeBranches.length>0 ? activeBranches : JUMP_TREE.branches;

  // Dynamic SVG connector based on branch count
  const bCount = branchesToShow.length;
  const xPos = bCount===1?[150]:bCount===2?[75,225]:[50,150,250];
  const connSVG = `<svg viewBox="0 0 300 38" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:34px;display:block;overflow:visible">
    <line x1="150" y1="0" x2="150" y2="16" stroke="${lineCol}" stroke-width="2"/>
    ${bCount>1?`<line x1="${xPos[0]}" y1="16" x2="${xPos[bCount-1]}" y2="16" stroke="${lineCol}" stroke-width="2"/>`:''}
    ${xPos.map(x=>`<line x1="${x}" y1="16" x2="${x}" y2="38" stroke="${lineCol}" stroke-width="2"/>`).join('')}
  </svg>`;

  // Branch columns
  const branchesHTML = branchesToShow.map(b=>{
    const nodesHTML = b.nodes.map((n,i)=>{
      const isDone = done.includes(n.id);
      const prevDone = i===0 || done.includes(b.nodes[i-1].id);
      const cls = isDone?'done':(allTrunkDone&&prevDone)?'available':'locked';
      const circBg = isDone?b.color:cls==='available'?'transparent':'var(--bg2)';
      const circBorder = cls==='available'?`border:1.5px solid ${b.color}`:'';
      const circColor = isDone?'#0b1220':cls==='available'?b.color:'var(--sub)';
      const vline = i<b.nodes.length-1
        ? `<div class="jt-bvline" style="background:${isDone?b.color:'var(--line)'}"></div>` : '';
      const clickable = cls!=='locked' ? `data-node="${n.id}"` : '';
      return `<div class="jt-bnode ${cls}" ${clickable} style="border-color:${cls!=='locked'?b.color:'var(--line)'};${clickable?'cursor:pointer':''}">
        <div class="jt-bcirc" style="background:${circBg};${circBorder};color:${circColor}">${isDone?'✓':''}</div>
        <div><div class="jt-bnode-label">${n.label}</div><div class="jt-bnode-sub">${n.sub}</div></div>
      </div>${vline}`;
    }).join('');
    let dunkCalc = '';
    if(b.key==='finishing' && DB.profile.height){
      const h = DB.profile.height;
      const reach = Math.round(h * 1.33);
      const needed = 305 - reach;
      const tl = needed<=20?'1〜3ヶ月':needed<=35?'3〜6ヶ月':needed<=50?'6ヶ月〜1年':needed<=70?'1〜2年':'2年以上';
      const hard = needed > 80 ? '⚠️ 難易度が非常に高いため、まずリムタッチを目標にします' : '';
      dunkCalc = `<div class="jt-dunk-calc" style="border-color:${b.color}20;background:${b.color}08">
        <div style="font-size:9px;font-weight:700;color:${b.color};margin-bottom:3px">🏀 ダンク計算</div>
        <div style="font-size:9px;color:var(--sub)">立ちリーチ約${reach}cm → あと<b style="color:${b.color}">${needed}cm</b></div>
        <div style="font-size:9px;color:var(--sub)">目安期間: <b style="color:var(--fg)">${tl}</b></div>
        ${hard?`<div style="font-size:8.5px;color:var(--yellow);margin-top:2px">${hard}</div>`:''}
      </div>`;
    }
    return `<div class="jt-branch">
      <div class="jt-bhead" style="color:${b.color}">${b.icon} ${b.label}</div>
      ${dunkCalc}${nodesHTML}
    </div>`;
  }).join('');

  return `<div class="skill-tree">
    <div class="sm-label">SKILL TREE</div>
    <div class="jt-tag">共通コア — 全課題で必須</div>
    <div class="jt-trunk">${trunkHTML}</div>
    ${connSVG}
    <div class="jt-tag">課題別トレーニング${activeBranches.length===0?' — 課題を選ぶと絞り込まれます':''}</div>
    <div class="jt-branches" style="grid-template-columns:${'1fr '.repeat(bCount).trim()}">${branchesHTML}</div>
  </div>`;
}

function findBranchNode(nodeId){
  for(const b of JUMP_TREE.branches){
    const n=b.nodes.find(x=>x.id===nodeId);
    if(n) return {branch:b, node:n};
  }
  return null;
}

function showBranchNode(nodeId){
  const hit=findBranchNode(nodeId);
  if(!hit) return;
  const {branch:b, node:n}=hit;
  const isDone=(DB.completedNodes||[]).includes(nodeId);
  const drillsHTML=(n.drills||[]).map(d=>`
    <div class="bn-drill">
      <div class="bn-drill-info">
        <div class="bn-drill-name">${d.name}</div>
        <div class="bn-drill-dose">${d.dose}</div>
      </div>
      <a class="bn-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(d.yt)}" target="_blank" rel="noopener">▶ 動画</a>
    </div>`).join('');
  const overlay=document.createElement('div');
  overlay.className='bn-overlay';
  overlay.innerHTML=`
    <div class="bn-panel">
      <div class="bn-head" style="color:${b.color}">${b.icon} ${b.label}ブランチ</div>
      <div class="bn-title">${n.label}</div>
      <div class="bn-goal">🎯 ${n.goal||n.sub}</div>
      <div class="bn-drills">${drillsHTML}</div>
      <button class="bn-complete${isDone?' done':''}" id="bnComplete">
        ${isDone?'✓ 習得済み — タップで未習得に戻す':'このノードを習得した！'}
      </button>
      <button class="bn-close" id="bnClose">閉じる</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.onclick=e=>{ if(e.target===overlay) overlay.remove(); };
  overlay.querySelector('#bnClose').onclick=()=>overlay.remove();
  overlay.querySelector('#bnComplete').onclick=()=>{
    if(!DB.completedNodes) DB.completedNodes=[];
    if(isDone){ DB.completedNodes=DB.completedNodes.filter(x=>x!==nodeId); }
    else{ DB.completedNodes.push(nodeId); toast(`🎉 「${n.label}」習得！`); }
    saveDB(); overlay.remove(); renderPath();
  };
}

function renderPath(){
  const goal=getGoal();
  const currentGoalKey=DB.profile.goal;

  $('#pathGoalLabel').textContent=`${goal.icon} ${goal.name}ルート`;
  $('#pathTitle').textContent=goal.peak;
  $('#pathSub').textContent=`Stage ${DB.currentStage+1} / ${goal.stages.length}`;

  // ── Sphere Map SVG ──
  const goalOrder=['jump','speed','agility','endurance','strength'];
  const cx=175, cy=122, r=88;
  const pts=goalOrder.map((_,i)=>{
    const a=-Math.PI/2+(2*Math.PI/5)*i;
    return {x:+(cx+r*Math.cos(a)).toFixed(1), y:+(cy+r*Math.sin(a)).toFixed(1)};
  });
  // Pentagon outline
  const penPoly=pts.map(p=>`${p.x},${p.y}`).join(' ');
  // Non-current nodes (gray + lock)
  const nonCurrent=goalOrder.map((gKey,i)=>{
    if(gKey===currentGoalKey) return '';
    const p=pts[i];
    return `<circle cx="${p.x}" cy="${p.y}" r="20" fill="#0d1525" stroke="#27344f" stroke-width="1.5"/>
<text x="${p.x}" y="${p.y}" text-anchor="middle" dy="0.35em" font-size="16" opacity="0.2">${GOALS[gKey].icon}</text>
<text x="${p.x}" y="${+p.y+16}" text-anchor="middle" font-size="8" fill="#3a4a6a" letter-spacing="0.5">LOCK</text>`;
  }).join('');
  // Current goal node
  const ci=goalOrder.indexOf(currentGoalKey);
  const cp=ci>=0?pts[ci]:{x:cx,y:cy};
  const gc=GOALS[currentGoalKey]?.color||'var(--accent)';
  const currentSVG=`<line x1="${cx}" y1="${cy}" x2="${cp.x}" y2="${cp.y}" stroke="${gc}" stroke-width="1" opacity="0.2"/>
<circle cx="${cp.x}" cy="${cp.y}" r="38" fill="${gc}" fill-opacity="0.05" stroke="${gc}" stroke-width="0.8" stroke-dasharray="4 3"/>
<circle cx="${cp.x}" cy="${cp.y}" r="26" fill="#0d1525" stroke="${gc}" stroke-width="2.5"/>
<text x="${cp.x}" y="${cp.y}" text-anchor="middle" dy="0.35em" font-size="22">${goal.icon}</text>
<circle cx="${cx}" cy="${cy}" r="8" fill="${gc}" fill-opacity="0.4" stroke="${gc}" stroke-width="1.5"/>`;

  const sphereMapHTML=`<div class="sphere-map-wrap">
  <div class="sm-label">SPHERE MAP</div>
  <svg viewBox="0 0 350 244" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:300px;display:block;margin:0 auto">
    <polygon points="${penPoly}" fill="none" stroke="#27344f" stroke-width="1" stroke-dasharray="3 5"/>
    ${nonCurrent}${currentSVG}
  </svg>
  <div class="sm-sub">光っているルートが現在進行中。他のルートは未着手</div>
</div>`;

  // ── Stage progress spheres ──
  let sphereNodes='';
  goal.stages.forEach((s,idx)=>{
    const isDone=DB.stagesDone.includes(idx);
    const isCurrent=DB.currentStage===idx&&!isDone;
    const cls=isDone?'done':isCurrent?'current':'locked';
    if(idx>0) sphereNodes+=`<div class="ss-line ${DB.stagesDone.includes(idx-1)?'done':''}"></div>`;
    sphereNodes+=`<div class="ss-node"><div class="ss-circle ${cls}">${isDone?'✓':`S${s.num}`}</div><div class="ss-title">${s.title}</div></div>`;
  });
  const stageProgressHTML=`<div class="stage-progress-wrap">
  <div class="sm-label">CURRENT ROUTE — ${goal.name}</div>
  <div class="stage-spheres">${sphereNodes}</div>
</div>`;

  // ── Detailed stage cards ──
  const peakHTML=`<div class="peak-node"><div class="pk-icon">🗻</div><div class="pk-title">${goal.peak}</div><div class="pk-sub">全ステージ制覇で到達</div></div>`;

  const stagesHTML=[...goal.stages].reverse().map(s=>{
    const idx=s.num-1;
    const isDone=DB.stagesDone.includes(idx);
    const isCurrent=DB.currentStage===idx&&!isDone;
    const isLocked=idx>DB.currentStage;
    const cls=isDone?'done':isCurrent?'current':'locked';
    const inner=isLocked
      ?`<div class="pc-num">STAGE ${s.num}</div><div class="pc-title">${s.title}</div><div class="pc-lock">🔒 Stage ${s.num-1}クリアで解放</div>`
      :isDone
      ?`<div class="pc-num">STAGE ${s.num} — CLEAR</div><div class="pc-title">${s.title}</div><div class="pc-done-badge">✓ 完了</div>`
      :`<div class="pc-num">STAGE ${s.num} — 現在地</div><div class="pc-title">${s.title}</div><div class="pc-focus">${s.focus}</div><div class="pc-milestone">🎯 ${s.milestone}</div>`;
    return `<div class="path-node ${cls}"><div class="path-dot"></div><div class="path-card">${inner}</div></div>`;
  }).join('');

  const isJump=DB.profile.goal==='jump';
  const futureHTML=`<div class="future-section"><div class="future-title">🔒 UNLOCKABLE CONTENT</div>
    ${isJump?`<div class="future-card"><div class="fc-icon">🎥</div><div><div class="fc-name">ジャンプフォームガイド</div><div class="fc-lock">踏み切り・着地・腕の使い方の完全解説</div></div><div class="fc-badge">Stage 1</div></div>`:''}
    <div class="future-card"><div class="fc-icon">🥗</div><div><div class="fc-name">栄養ガイド</div><div class="fc-lock">筋トレ効果を最大化する食事戦略</div></div><div class="fc-badge">Stage 2</div></div>
    <div class="future-card"><div class="fc-icon">😴</div><div><div class="fc-name">リカバリー&睡眠プロトコル</div><div class="fc-lock">超回復を最大化する方法</div></div><div class="fc-badge">Stage 3</div></div>
    <div class="future-card"><div class="fc-icon">🧠</div><div><div class="fc-name">メンタル・集中力トレーニング</div><div class="fc-lock">本番で力を出しきる</div></div><div class="fc-badge">Stage 4</div></div>
  </div>`;

  const isJumpGoal = DB.profile.goal === 'jump';
  const routeContent = isJumpGoal
    ? renderJumpTree()
    : `${stageProgressHTML}<div class="path-line"></div>${peakHTML}${stagesHTML}`;
  $('#pathWrap').innerHTML=`${sphereMapHTML}${routeContent}${futureHTML}`;
  $('#pathWrap').querySelectorAll('[data-node]').forEach(el=>{
    el.onclick=()=>showBranchNode(el.dataset.node);
  });
}

function renderProfile(){
  const p=DB.profile;

  const freqMap={1:'週1日',2:'週2〜3日',3:'週4〜5日',4:'週6〜7日'};

  const injMap={none:'なし',knee:'膝',back:'腰',ankle:'足首',shoulder:'肩'};

  const chalMap={
    lost:'何から始めるかわからない', plateau:'伸び悩み', balance:'バスケとの両立', injury:'ケガが心配',
    finishing:'フィニッシュが決められない', rebound_lose:'リバウンドで跳び負ける', block_low:'ブロックが決まらない', takeoff_weak:'踏み切りの爆発力',
    drive_beat:'ドライブで抜けない', fastbreak:'速攻で走り負ける', shaken:'マークマンに振り切られる',
    of_cut:'OFで左右に抜けない', df_follow:'DFでついていけない', change_dir:'方向転換が遅い',
    no_exp:'フィジカルが初めて', no_change:'体が変わらない', fatigue:'疲労バランス', pain:'関節・ケガが心配',
    legs_heavy:'後半に足が重い', recovery:'インターバル回復が遅い', defense:'ハードDFが続かない',
  };

  $('#profileDetail').innerHTML=`
    <div class="ps-header">PROFILE</div>
    <div class="ps-row"><span class="ps-key">メインゴール</span><span class="ps-val">${goal.icon} ${goal.name}</span></div>
    <div class="ps-row"><span class="ps-key">現在のレベル</span><span class="ps-val">${abLabel}</span></div>
    <div class="ps-row"><span class="ps-key">課題タイプ</span><span class="ps-val">${(Array.isArray(p.challenge)?p.challenge:[p.challenge]).map(c=>chalMap[c]).filter(Boolean).join('・')||'-'}</span></div>
    <div class="ps-row"><span class="ps-key">バスケ頻度</span><span class="ps-val">${freqMap[p.bball_freq]||'-'}</span></div>
    <div class="ps-row"><span class="ps-key">${p.goal==='strength'?'コンタクト診断':'体力レベル'}</span><span class="ps-val">${lvMap[p.fitness]||'-'}</span></div>
    <div class="ps-row"><span class="ps-key">環境</span><span class="ps-val">${eqMap[p.equipment]||'-'}</span></div>
    <div class="ps-row"><span class="ps-key">ケガ配慮</span><span class="ps-val">${injLabel}</span></div>
    <div class="ps-row"><span class="ps-key">時間</span><span class="ps-val">${p.time}分</span></div>
    <div class="ps-row"><span class="ps-key">現ステージ</span><span class="ps-val">Stage ${DB.currentStage+1} / ${goal.stages.length}</span></div>`;

function renderStats(){
  $('#stStreak').textContent=calcStreak()+'日';
  $('#stStage').textContent=`S${DB.currentStage+1}`;
  $('#stWeek').textContent=calcWeek()+'回';
}
function calcStreak(){
  let s=0;
  for(let i=0;i<60;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    if((DB.checkedToday[k]&&DB.checkedToday[k].length)) s++;
    else if(i>0) break;
  }
  return s;
}
function calcWeek(){
  let c=0;
  for(let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    if(DB.checkedToday[k]&&DB.checkedToday[k].length) c++;
  }
  return c;
}

/* ================================================================

================================================================ */
document.addEventListener('click',e=>{
  const chk=e.target.closest('[data-check]');
  if(chk){
    const id=chk.dataset.check, d=today();
    DB.checkedToday[d]=DB.checkedToday[d]||[];
    const i=DB.checkedToday[d].indexOf(id);
    i>=0?DB.checkedToday[d].splice(i,1):(DB.checkedToday[d].push(id),toast('ナイス！'));
    saveDB(); renderToday(); renderStats(); return;
  }
  const exp=e.target.closest('[data-expand]');
  if(exp){
    const det=$(`#detail-${exp.dataset.expand}`);
    if(det){ det.classList.toggle('open'); exp.classList.toggle('open'); } return;
  }
  const tab=e.target.closest('[data-v]');
  if(tab&&tab.closest('#tabbar')){ switchView(tab.dataset.v); return; }
});

$('#gdToggle').addEventListener('click',()=>{
  gameDayMode=!gameDayMode;
  DB.gameDay=gameDayMode; DB.lastGameDay=gameDayMode?today():'';
  saveDB(); renderToday();
});
$('#resetBtn').addEventListener('click',()=>{
  if(confirm('全データをリセットします。よろしいですか？')){ localStorage.removeItem(KEY); location.reload(); }
});

/* ── PWA install ── */
(function(){
  // Inject manifest at runtime (absolute URLs so it works wherever hosted)
  try{
    const iconSvg="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%230b1220'/%3E%3Ccircle cx='256' cy='256' r='160' fill='%23ff7a1a'/%3E%3Cpath d='M96 256h320M256 96v320M155 140a220 220 0 0 1 0 232M357 140a220 220 0 0 0 0 232' stroke='%230b1220' stroke-width='14' fill='none'/%3E%3C/svg%3E";
    const manifest={
      name:'HOOP STRENGTH', short_name:'HOOP STR',
      start_url:location.href.split('#')[0], scope:location.href.replace(/[^/]*$/,''),
      display:'standalone', background_color:'#0b1220', theme_color:'#0b1220',
      icons:[{src:iconSvg,sizes:'any',type:'image/svg+xml',purpose:'any'}]
    };
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const link=document.createElement('link');
    link.rel='manifest'; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
  }catch(e){}

  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault(); deferredPrompt=e;
    const btn=$('#installBtn'); if(btn) btn.style.display='block';
  });
  const btn=$('#installBtn');
  if(btn) btn.onclick=async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const {outcome}=await deferredPrompt.userChoice;
    if(outcome==='accepted'){ toast('📲 インストールしました！'); btn.style.display='none'; }
    deferredPrompt=null;
  };
  window.addEventListener('appinstalled',()=>{ const b=$('#installBtn'); if(b) b.style.display='none'; });
})();

function switchView(v){
  ['today','path','profile'].forEach(x=>$(`#view-${x}`).classList.toggle('on',x===v));
  $('#tabbar').querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  window.scrollTo(0,0);
}
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
function $(s){ return document.querySelector(s); }

/* INIT */
if(DB){ $('#obWrap').classList.add('gone'); startApp(); }
else { obStep=0; obAnswers={}; renderOB(); }
